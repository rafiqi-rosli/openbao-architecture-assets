<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenBao non-production database access architecture</title>
  <desc id="desc">Humans authenticate with Microsoft Entra ID, OpenBao runs in central-shared-nonprod EKS, OpenBao stores its own state in a dedicated Aurora PostgreSQL backend, and issues short-lived PostgreSQL credentials for a pilot non-production Aurora target.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #475467; }
      .section { font: 700 16px Arial, sans-serif; fill: #475467; letter-spacing: 0.04em; }
      .label { font: 700 18px Arial, sans-serif; fill: #101828; }
      .small { font: 500 14px Arial, sans-serif; fill: #344054; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 18; }
      .blue { fill: #eff6ff; stroke: #60a5fa; }
      .purple { fill: #f5f3ff; stroke: #a78bfa; }
      .green { fill: #ecfdf3; stroke: #4ade80; }
      .amber { fill: #fffbeb; stroke: #f59e0b; }
      .gray { fill: #f8fafc; stroke: #cbd5e1; }
      .outer { fill: none; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 10 8; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .line2 { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .note { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .pill { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 999; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>

  <text x="70" y="68" class="title">OpenBao Database Access Architecture</text>
  <text x="70" y="98" class="subtitle">Clean system flow for non-production. OpenBao brokers short-lived PostgreSQL credentials and keeps its own backend state.</text>

  <rect x="40" y="140" width="1518" height="690" class="outer" rx="26"/>
  <text x="72" y="174" class="section">NONPROD AWS BOUNDARY</text>

  <text x="70" y="230" class="section">IDENTITY</text>
  <rect x="80" y="255" width="260" height="250" class="box blue"/>
  <text x="110" y="300" class="label">Humans</text>
  <text x="110" y="332" class="small">DBeaver Community</text>
  <text x="110" y="358" class="small">psql</text>
  <text x="110" y="392" class="tiny">1. Sign in and request access</text>
  <text x="110" y="420" class="tiny">2. Use issued credentials directly</text>

  <rect x="80" y="530" width="260" height="140" class="box purple"/>
  <text x="110" y="570" class="label">Microsoft Entra ID</text>
  <text x="110" y="602" class="small">OIDC + group claims</text>
  <text x="110" y="632" class="tiny">Identity source for policy mapping</text>

  <text x="390" y="230" class="section">CONTROL PLANE</text>
  <rect x="410" y="255" width="485" height="415" class="box gray"/>
  <text x="442" y="300" class="label">OpenBao on central-shared-nonprod EKS</text>
  <text x="442" y="330" class="tiny">Helm chart via existing GitOps pattern</text>

  <rect x="445" y="365" width="190" height="95" class="pill" rx="18"/>
  <text x="470" y="402" class="small">3 replicas</text>
  <text x="470" y="428" class="tiny">HA, not a single pod</text>

  <rect x="655" y="365" width="205" height="95" class="pill" rx="18"/>
  <text x="680" y="402" class="small">KMS auto-unseal</text>
  <text x="680" y="428" class="tiny">No manual unseal</text>

  <rect x="445" y="480" width="190" height="82" class="pill" rx="18"/>
  <text x="473" y="516" class="small">TLS ingress</text>
  <text x="473" y="540" class="tiny">Internal access only</text>

  <rect x="655" y="480" width="205" height="82" class="pill" rx="18"/>
  <text x="680" y="516" class="small">Audit + metrics</text>
  <text x="680" y="540" class="tiny">Trace identity and leases</text>

  <rect x="445" y="585" width="415" height="62" class="note"/>
  <text x="468" y="623" class="small">OpenBao is a credential broker, not a PostgreSQL proxy.</text>

  <text x="930" y="230" class="section">BACKEND AND TARGET</text>
  <rect x="940" y="255" width="230" height="150" class="box amber"/>
  <text x="970" y="300" class="label">Dedicated Aurora</text>
  <text x="970" y="332" class="small">OpenBao storage backend</text>
  <text x="970" y="360" class="tiny">State, leases, and policy data</text>

  <rect x="1220" y="245" width="300" height="285" class="box blue"/>
  <text x="1250" y="290" class="label">Pilot Aurora PostgreSQL</text>
  <text x="1250" y="322" class="small">Non-production target</text>
  <text x="1250" y="350" class="tiny">OpenBao issues ephemeral login creds</text>
  <rect x="1250" y="382" width="220" height="48" class="pill" rx="24"/>
  <text x="1278" y="412" class="small">Stable NOLOGIN roles</text>
  <rect x="1250" y="442" width="220" height="48" class="pill" rx="24"/>
  <text x="1278" y="472" class="small">Ephemeral LOGIN role</text>
  <rect x="1250" y="502" width="220" height="34" class="pill" rx="17"/>
  <text x="1278" y="525" class="tiny">Connect from DBeaver or psql</text>

  <text x="930" y="460" class="section">FLOW</text>

  <circle cx="375" cy="355" r="18" fill="#e0f2fe" stroke="#60a5fa" stroke-width="2"/>
  <text x="369" y="361" class="small">1</text>
  <path d="M340 355 C375 355, 385 355, 410 355" class="line"/>
  <text x="352" y="338" class="tiny">OIDC login</text>

  <circle cx="375" cy="595" r="18" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="369" y="601" class="small">2</text>
  <path d="M340 595 C395 595, 405 560, 445 545" class="line2"/>
  <text x="350" y="578" class="tiny">claims + group policy</text>

  <circle cx="905" cy="420" r="18" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="899" y="426" class="small">3</text>
  <path d="M895 420 C920 420, 930 340, 940 340" class="line"/>
  <text x="862" y="392" class="tiny">backend state</text>

  <circle cx="905" cy="500" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="899" y="506" class="small">4</text>
  <path d="M895 500 C970 500, 1040 490, 1220 412" class="line"/>
  <text x="962" y="476" class="tiny">issue short-lived creds</text>

  <circle cx="340" cy="690" r="18" fill="#e0f2fe" stroke="#60a5fa" stroke-width="2"/>
  <text x="334" y="696" class="small">5</text>
  <path d="M355 690 C520 690, 910 690, 1250 526" class="line2"/>
  <text x="680" y="670" class="tiny">connect using issued credential</text>

  <rect x="80" y="705" width="1440" height="80" class="note"/>
  <text x="110" y="755" class="small">This keeps human access short-lived, auditable, and separate from persistent database user management.</text>
</svg>