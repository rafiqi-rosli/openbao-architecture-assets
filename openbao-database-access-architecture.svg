<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenBao non-production database access architecture</title>
  <desc id="desc">Humans authenticate with Microsoft Entra ID, reach OpenBao running in central-shared-nonprod EKS, and receive short-lived PostgreSQL credentials for a non-production Aurora target. OpenBao keeps its own dedicated Aurora PostgreSQL storage backend and audit logs.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <marker id="arrowSoft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px Arial, sans-serif; fill: #475467; }
      .label { font: 700 18px Arial, sans-serif; fill: #101828; }
      .small { font: 500 14px Arial, sans-serif; fill: #344054; }
      .tiny { font: 500 12px Arial, sans-serif; fill: #475467; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 18; }
      .blue { fill: #eff6ff; stroke: #60a5fa; }
      .green { fill: #ecfdf3; stroke: #4ade80; }
      .purple { fill: #f5f3ff; stroke: #a78bfa; }
      .amber { fill: #fffbeb; stroke: #f59e0b; }
      .gray { fill: #f8fafc; stroke: #cbd5e1; }
      .dash { fill: none; stroke: #94a3b8; stroke-width: 2.5; stroke-dasharray: 10 8; }
      .line { fill: none; stroke: #334155; stroke-width: 3; marker-end: url(#arrow); }
      .lineSoft { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrowSoft); }
      .lineDash { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 7; marker-end: url(#arrowSoft); }
      .pill { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 999; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#f8fafc"/>

  <text x="70" y="68" class="title">OpenBao Database Access Architecture</text>
  <text x="70" y="98" class="subtitle">Non-production only. OpenBao brokers short-lived PostgreSQL credentials for a pilot Aurora target.</text>

  <rect x="40" y="140" width="1520" height="720" class="dash" rx="26"/>
  <text x="72" y="176" class="label">central-shared-nonprod AWS account</text>

  <rect x="80" y="230" width="265" height="150" class="box blue"/>
  <text x="110" y="270" class="label">Humans</text>
  <text x="110" y="300" class="small">DBeaver Community</text>
  <text x="110" y="326" class="small">psql</text>
  <text x="110" y="354" class="tiny">Request credentials and connect</text>

  <rect x="80" y="430" width="265" height="140" class="box purple"/>
  <text x="110" y="470" class="label">Microsoft Entra ID</text>
  <text x="110" y="500" class="small">OIDC sign-in</text>
  <text x="110" y="526" class="small">Group claims</text>
  <text x="110" y="552" class="tiny">Identity source and policy input</text>

  <rect x="420" y="185" width="540" height="370" class="box gray"/>
  <text x="448" y="225" class="label">central-shared-nonprod EKS cluster</text>

  <rect x="455" y="255" width="470" height="255" class="box"/>
  <text x="485" y="295" class="label">OpenBao HA deployment</text>
  <text x="485" y="323" class="tiny">Helm chart via existing GitOps pattern</text>
  <rect x="485" y="350" width="170" height="82" class="pill" rx="18"/>
  <text x="510" y="386" class="small">3 replicas</text>
  <text x="510" y="409" class="tiny">No single pod</text>
  <rect x="670" y="350" width="230" height="82" class="pill" rx="18"/>
  <text x="695" y="386" class="small">KMS auto-unseal</text>
  <text x="695" y="409" class="tiny">No manual unseal</text>
  <rect x="485" y="445" width="170" height="52" class="pill" rx="18"/>
  <text x="512" y="478" class="small">TLS ingress</text>
  <rect x="670" y="445" width="230" height="52" class="pill" rx="18"/>
  <text x="695" y="478" class="small">Audit logs and metrics</text>

  <rect x="420" y="585" width="540" height="150" class="box gray"/>
  <text x="448" y="625" class="label">OpenBao control plane</text>
  <text x="448" y="653" class="small">Issue short-lived credentials</text>
  <text x="448" y="679" class="small">Lease, renew, revoke</text>
  <text x="448" y="705" class="tiny">Policy mapping from Entra groups</text>

  <rect x="1025" y="225" width="250" height="150" class="box amber"/>
  <text x="1055" y="265" class="label">Dedicated Aurora</text>
  <text x="1055" y="294" class="small">OpenBao storage backend</text>
  <text x="1055" y="322" class="tiny">State and leases only</text>

  <rect x="1295" y="225" width="240" height="285" class="box blue"/>
  <text x="1322" y="265" class="label">Pilot Aurora</text>
  <text x="1322" y="294" class="small">Non-production target</text>
  <text x="1322" y="322" class="small">PostgreSQL</text>
  <rect x="1320" y="345" width="185" height="50" class="pill" rx="25"/>
  <text x="1346" y="377" class="small">Stable NOLOGIN roles</text>
  <rect x="1320" y="408" width="185" height="50" class="pill" rx="25"/>
  <text x="1348" y="440" class="small">Ephemeral LOGIN role</text>
  <rect x="1320" y="471" width="185" height="34" class="pill" rx="17"/>
  <text x="1340" y="494" class="tiny">Use from DBeaver or psql</text>

  <rect x="1025" y="420" width="510" height="150" class="box gray"/>
  <text x="1055" y="460" class="label">Audit and monitoring</text>
  <text x="1055" y="488" class="small">Capture identity, lease, target user, and revoke events</text>
  <text x="1055" y="514" class="small">Keep operational review inside the control plane</text>

  <path d="M345 305 C395 305, 405 305, 455 305" class="line"/>
  <text x="360" y="289" class="tiny">OIDC login</text>

  <path d="M210 430 C210 395, 230 375, 325 345" class="lineSoft"/>
  <text x="145" y="405" class="tiny">token / claims</text>

  <path d="M925 335 C970 335, 990 335, 1025 335" class="line"/>
  <text x="947" y="318" class="tiny">state</text>

  <path d="M925 415 C985 415, 1040 415, 1295 415" class="line"/>
  <text x="985" y="399" class="tiny">dynamic credential</text>

  <path d="M345 505 C470 505, 610 505, 1295 365" class="lineDash"/>
  <text x="515" y="488" class="tiny">connect with issued creds</text>

  <path d="M690 535 C690 560, 690 565, 690 585" class="lineSoft"/>

  <path d="M1160 375 C1160 398, 1160 405, 1160 420" class="lineSoft"/>

  <text x="80" y="825" class="small">Flow: Humans authenticate with Entra OIDC, OpenBao evaluates policy in EKS, stores its own state in a dedicated Aurora backend, and brokers short-lived credentials to the pilot Aurora target.</text>
</svg>