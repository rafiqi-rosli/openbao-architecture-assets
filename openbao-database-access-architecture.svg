<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">OpenBao non-production database access architecture</title>
  <desc id="desc">Engineers authenticate through Microsoft Entra ID and request short-lived PostgreSQL credentials from OpenBao in central-shared-nonprod. OpenBao manages ephemeral users on non-production Aurora targets. Engineers connect directly through approved private network paths. Terraform owns stable roles and grants.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#2563eb"/></marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#7c3aed"/></marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#d97706"/></marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#059669"/></marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#64748b"/></marker>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .title { font-size: 30px; font-weight: 750; fill: #0f172a; }
      .subtitle { font-size: 15px; fill: #475569; }
      .zone { font-size: 13px; font-weight: 700; letter-spacing: 1.1px; fill: #64748b; }
      .heading { font-size: 18px; font-weight: 700; fill: #0f172a; }
      .body { font-size: 14px; fill: #334155; }
      .meta { font-size: 12px; fill: #64748b; }
      .edge-label { font-size: 12px; font-weight: 600; }
      .card { fill: #ffffff; stroke-width: 1.5; rx: 16; filter: url(#shadow); }
      .chip { fill: #ffffff; stroke: #dbe3ee; stroke-width: 1; rx: 12; }
      .boundary { fill: #ffffff; fill-opacity: 0.55; stroke: #cbd5e1; stroke-width: 1.5; rx: 22; }
      .blue-line { fill: none; stroke: #2563eb; stroke-width: 2; marker-end: url(#arrow-blue); }
      .purple-line { fill: none; stroke: #7c3aed; stroke-width: 2; marker-end: url(#arrow-purple); }
      .amber-line { fill: none; stroke: #d97706; stroke-width: 2; marker-end: url(#arrow-amber); }
      .green-line { fill: none; stroke: #059669; stroke-width: 2.2; marker-end: url(#arrow-green); }
      .gray-line { fill: none; stroke: #64748b; stroke-width: 1.8; marker-end: url(#arrow-gray); }
      .label-bg { fill: #f8fafc; rx: 6; }
    </style>
  </defs>
  <rect width="1400" height="780" fill="#f8fafc"/>
  <text x="60" y="52" class="title">OpenBao Database Access Architecture</text>
  <text x="60" y="80" class="subtitle">Non-production human database access</text>
  <text x="60" y="132" class="zone">IDENTITY AND CLIENT</text>
  <text x="390" y="132" class="zone">CENTRAL-SHARED-NONPROD</text>
  <text x="1020" y="132" class="zone">GENERIC NONPROD ESTATE</text>
  <rect x="370" y="145" width="610" height="470" class="boundary"/>
  <rect x="1000" y="145" width="340" height="470" class="boundary"/>
  <path d="M330 230 H424" class="blue-line"/>
  <rect x="342" y="207" width="78" height="18" class="label-bg"/>
  <text x="348" y="220" class="edge-label" fill="#2563eb">request role</text>
  <path d="M424 278 H336" class="blue-line"/>
  <rect x="334" y="284" width="94" height="18" class="label-bg"/>
  <text x="340" y="297" class="edge-label" fill="#2563eb">return credentials</text>
  <path d="M330 420 H375 V350 H424" class="purple-line"/>
  <rect x="337" y="385" width="91" height="18" class="label-bg"/>
  <text x="343" y="398" class="edge-label" fill="#7c3aed">identity + groups</text>
  <path d="M760 315 H1014" class="amber-line"/>
  <rect x="805" y="290" width="166" height="18" class="label-bg"/>
  <text x="812" y="303" class="edge-label" fill="#b45309">create / revoke ephemeral login</text>
  <path d="M790 255 H766" class="gray-line"/>
  <path d="M760 375 H784" class="gray-line"/>
  <path d="M595 420 V459" class="gray-line"/>
  <text x="607" y="448" class="edge-label" fill="#64748b">audit events</text>
  <path d="M330 305 H350 V650 H975 V405 H1014" class="green-line"/>
  <rect x="570" y="635" width="190" height="20" class="label-bg"/>
  <text x="578" y="649" class="edge-label" fill="#047857">direct database connection via private path</text>
  <rect x="60" y="180" width="270" height="135" class="card" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="88" y="218" class="heading">Engineer</text>
  <text x="88" y="248" class="body">DBeaver Community / psql</text>
  <text x="88" y="278" class="meta">Requests and uses short-lived credentials</text>
  <rect x="60" y="350" width="270" height="135" class="card" fill="#f5f3ff" stroke="#a78bfa"/>
  <text x="88" y="388" class="heading">Microsoft Entra ID</text>
  <text x="88" y="418" class="body">OIDC authentication</text>
  <text x="88" y="448" class="meta">Group claims drive OpenBao policy</text>
  <text x="400" y="176" class="meta">AWS account boundary</text>
  <rect x="430" y="200" width="330" height="220" class="card" fill="#ecfdf5" stroke="#34d399"/>
  <text x="460" y="240" class="heading">OpenBao on EKS</text>
  <text x="460" y="268" class="body">PostgreSQL database secrets engine</text>
  <rect x="460" y="295" width="125" height="38" class="chip"/>
  <text x="478" y="318" class="body">3 HA replicas</text>
  <rect x="600" y="295" width="130" height="38" class="chip"/>
  <text x="619" y="318" class="body">Internal TLS</text>
  <rect x="460" y="345" width="270" height="46" class="chip"/>
  <text x="478" y="368" class="body">Issue, renew, and revoke leases</text>
  <text x="460" y="406" class="meta">Credential broker, not a PostgreSQL proxy</text>
  <rect x="790" y="200" width="160" height="95" class="card" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="815" y="237" class="heading">AWS KMS</text>
  <text x="815" y="265" class="meta">Auto-unseal via IRSA</text>
  <rect x="790" y="330" width="160" height="110" class="card" fill="#fff7ed" stroke="#fb923c"/>
  <text x="815" y="367" class="heading">Aurora</text>
  <text x="815" y="394" class="body">OpenBao backend</text>
  <text x="815" y="420" class="meta">State and lease data</text>
  <rect x="430" y="465" width="520" height="105" class="card" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="460" y="503" class="heading">Audit storage and monitoring</text>
  <text x="460" y="532" class="body">Identity, lease, target username, and revocation events</text>
  <text x="460" y="557" class="meta">Persistent audit storage; operational metrics and alerts</text>
  <rect x="1020" y="200" width="290" height="240" class="card" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="1050" y="240" class="heading">Aurora PostgreSQL</text>
  <text x="1050" y="268" class="body">Pilot non-production target</text>
  <rect x="1050" y="300" width="230" height="42" class="chip"/>
  <text x="1070" y="326" class="body">Stable NOLOGIN roles</text>
  <rect x="1050" y="355" width="230" height="42" class="chip"/>
  <text x="1070" y="381" class="body">Ephemeral LOGIN role</text>
  <text x="1050" y="422" class="meta">Reached through approved private network paths</text>
  <rect x="1020" y="475" width="290" height="95" class="card" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1050" y="511" class="heading">Responsibility split</text>
  <text x="1050" y="539" class="body">Terraform: roles, grants, schemas</text>
  <text x="1050" y="562" class="body">OpenBao: ephemeral credential lifecycle</text>
  <line x1="60" y1="718" x2="100" y2="718" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="723" class="meta">credential request</text>
  <line x1="260" y1="718" x2="300" y2="718" stroke="#7c3aed" stroke-width="2"/>
  <text x="310" y="723" class="meta">identity</text>
  <line x1="415" y1="718" x2="455" y2="718" stroke="#d97706" stroke-width="2"/>
  <text x="465" y="723" class="meta">database management</text>
  <line x1="645" y1="718" x2="685" y2="718" stroke="#059669" stroke-width="2"/>
  <text x="695" y="723" class="meta">direct database connection</text>
  <line x1="920" y1="718" x2="960" y2="718" stroke="#64748b" stroke-width="2"/>
  <text x="970" y="723" class="meta">platform dependency</text>
</svg>